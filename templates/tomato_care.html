<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍅 Chăm Sóc Cà Chua | Tomato AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .game-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* Header */
    .game-header {
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .game-title {
      font-size: 1.8em;
      font-weight: bold;
      color: #2d3748;
    }
    
    .stats-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .stat-box {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1.1em;
      box-shadow: 0 4px 15px rgba(102,126,234,0.3);
    }
    
    .back-btn {
      background: #e53e3e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1em;
      transition: 0.3s;
    }
    
    .back-btn:hover {
      background: #c53030;
      transform: translateY(-2px);
    }
    
    /* Main content */
    .game-content {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
    }
    
    /* Garden area */
    .garden-area {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    
    .section-title {
      font-size: 1.5em;
      color: #2d3748;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .garden-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .plant-slot {
      background: linear-gradient(135deg, #f6f8fb 0%, #e9ecef 100%);
      border: 3px dashed #cbd5e0;
      border-radius: 15px;
      padding: 20px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
      position: relative;
    }
    
    .plant-slot:hover {
      border-color: #667eea;
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(102,126,234,0.2);
    }
    
    .plant-slot.has-plant {
      background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
      border-style: solid;
      border-color: #48bb78;
    }
    
    .plant-icon {
      font-size: 4em;
      margin-bottom: 10px;
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .plant-stage {
      font-size: 0.9em;
      color: #4a5568;
      margin-top: 5px;
    }
    
    .plant-health {
      margin-top: 10px;
      width: 100%;
    }
    
    .health-bar {
      width: 100%;
      height: 8px;
      background: rgba(0,0,0,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 5px;
    }
    
    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, #48bb78, #38a169);
      transition: width 0.3s;
    }
    
    .plant-actions {
      display: flex;
      gap: 5px;
      margin-top: 10px;
      width: 100%;
    }
    
    .action-btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2em;
      transition: 0.2s;
      background: white;
    }
    
    .action-btn:hover {
      transform: scale(1.1);
    }
    
    .action-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .plant-timer {
      font-size: 0.85em;
      color: #718096;
      margin-top: 5px;
    }
    
    /* Sidebar */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .sidebar-panel {
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    
    .panel-title {
      font-size: 1.2em;
      font-weight: bold;
      color: #2d3748;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* Inventory */
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    
    .inventory-item {
      background: #f7fafc;
      padding: 12px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 2px solid #e2e8f0;
    }
    
    .item-icon {
      font-size: 1.5em;
    }
    
    .item-info {
      flex: 1;
    }
    
    .item-name {
      font-size: 0.9em;
      color: #4a5568;
    }
    
    .item-count {
      font-weight: bold;
      color: #2d3748;
    }
    
    /* Shop */
    .shop-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .shop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f7fafc;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid #e2e8f0;
      transition: 0.2s;
    }
    
    .shop-item:hover {
      border-color: #667eea;
      transform: translateX(5px);
    }
    
    .shop-item-icon {
      font-size: 1.8em;
    }
    
    .shop-item-info {
      flex: 1;
    }
    
    .shop-item-name {
      font-weight: bold;
      color: #2d3748;
    }
    
    .shop-item-price {
      font-size: 0.9em;
      color: #667eea;
      font-weight: bold;
    }
    
    /* Progress */
    .progress-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .progress-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #f7fafc;
      border-radius: 8px;
    }
    
    .progress-label {
      color: #4a5568;
    }
    
    .progress-value {
      font-weight: bold;
      color: #667eea;
    }
    
    /* Achievements */
    .achievement-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .achievement {
      padding: 10px;
      background: #f7fafc;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 3px solid #667eea;
    }
    
    .achievement.locked {
      opacity: 0.5;
      border-left-color: #cbd5e0;
    }
    
    /* Notification */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      padding: 15px 20px;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      transform: translateX(400px);
      transition: transform 0.3s;
      z-index: 1000;
      border-left: 4px solid #48bb78;
    }
    
    .notification.show {
      transform: translateX(0);
    }
    
    .notification.error {
      border-left-color: #e53e3e;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    
    .modal.show {
      display: flex;
    }
    
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      text-align: center;
    }
    
    .modal-title {
      font-size: 1.5em;
      margin-bottom: 15px;
      color: #2d3748;
    }
    
    .modal-text {
      color: #4a5568;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    
    .modal-btn {
      padding: 10px 30px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1em;
      transition: 0.3s;
    }
    
    .modal-btn.primary {
      background: #667eea;
      color: white;
    }
    
    .modal-btn.primary:hover {
      background: #5a67d8;
    }
    
    .modal-btn.secondary {
      background: #e2e8f0;
      color: #4a5568;
    }
    
    .modal-btn.secondary:hover {
      background: #cbd5e0;
    }
    
    /* Responsive */
    @media (max-width: 968px) {
      .game-content {
        grid-template-columns: 1fr;
      }
      
      .garden-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
      font-size: 1.2em;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(102,126,234,0.3);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <!-- Header -->
    <div class="game-header">
      <div class="game-title">🍅 Vườn Cà Chua Của Tôi</div>
      <div class="stats-row">
        <div class="stat-box">💰 <span id="coins">0</span> Xu</div>
        <div class="stat-box">🍅 <span id="harvested">0</span> Thu hoạch</div>
        <div class="stat-box">⭐ Level <span id="level">1</span></div>
      </div>
      <button class="back-btn" onclick="window.location.href='/game'">↩ Quay lại</button>
    </div>
    
    <!-- Main content -->
    <div class="game-content">
      <!-- Garden area -->
      <div class="garden-area">
        <div class="section-title">🌱 Vườn Cà Chua</div>
        <div class="garden-grid" id="gardenGrid">
          <!-- Plants will be added here -->
        </div>
      </div>
      
      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Inventory -->
        <div class="sidebar-panel">
          <div class="panel-title">🎒 Kho Đồ</div>
          <div class="inventory-grid" id="inventoryGrid">
            <!-- Inventory items will be shown here -->
          </div>
        </div>
        
        <!-- Shop -->
        <div class="sidebar-panel">
          <div class="panel-title">🏪 Cửa Hàng</div>
          <div class="shop-items" id="shopItems">
            <!-- Shop items will be shown here -->
          </div>
        </div>
        
        <!-- Progress -->
        <div class="sidebar-panel">
          <div class="panel-title">📊 Tiến Độ</div>
          <div class="progress-section">
            <div class="progress-item">
              <span class="progress-label">Tổng thu nhập</span>
              <span class="progress-value" id="totalEarned">0 xu</span>
            </div>
            <div class="progress-item">
              <span class="progress-label">Cây đã trồng</span>
              <span class="progress-value" id="totalPlanted">0</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Notification -->
  <div class="notification" id="notification">
    <div id="notificationText"></div>
  </div>
  
  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-text" id="modalText"></div>
      <div class="modal-buttons" id="modalButtons"></div>
    </div>
  </div>
  
  <script>
    // Game data from server
    let gameData = {{ progress | tojson }};
    
    // Constants
    const MAX_PLANTS = 6;
    const GROWTH_STAGES = {
      seed: { icon: '🌰', name: 'Hạt giống', duration: 30, next: 'sprout' },
      sprout: { icon: '🌱', name: 'Mầm non', duration: 60, next: 'growing' },
      growing: { icon: '🪴', name: 'Đang lớn', duration: 120, next: 'mature' },
      mature: { icon: '🌿', name: 'Trưởng thành', duration: 120, next: 'fruiting' },
      fruiting: { icon: '🍅', name: 'Ra quả', duration: 0, next: null }
    };
    
    const SHOP_ITEMS = {
      seed: { icon: '🌰', name: 'Hạt giống', price: 20, type: 'plant' },
      water: { icon: '💧', name: 'Nước', price: 5 },
      fertilizer: { icon: '🌾', name: 'Phân bón', price: 15 },
      pesticide: { icon: '🪲', name: 'Thuốc trừ sâu', price: 20 },
      medicine: { icon: '💊', name: 'Thuốc chữa bệnh', price: 30 }
    };
    
    const DISEASES = [
      { id: 'leaf_spot', name: 'Đốm lá', icon: '🍂', damage: 10, cure: 'medicine' },
      { id: 'pests', name: 'Sâu hại', icon: '🪲', damage: 15, cure: 'pesticide' },
      { id: 'thirsty', name: 'Thiếu nước', icon: '💦', damage: 5, cure: 'water' }
    ];
    
    // Update UI
    function updateUI() {
      document.getElementById('coins').textContent = gameData.coins;
      document.getElementById('harvested').textContent = gameData.total_harvested;
      document.getElementById('level').textContent = gameData.level;
      document.getElementById('totalEarned').textContent = gameData.total_earned + ' xu';
      document.getElementById('totalPlanted').textContent = gameData.plants.length;
      
      updateGarden();
      updateInventory();
      updateShop();
    }
    
    // Update garden
    function updateGarden() {
      const grid = document.getElementById('gardenGrid');
      grid.innerHTML = '';
      
      for (let i = 0; i < MAX_PLANTS; i++) {
        const plant = gameData.plants[i];
        const slot = document.createElement('div');
        
        if (plant) {
          slot.className = 'plant-slot has-plant';
          const stage = GROWTH_STAGES[plant.stage];
          const health = plant.health || 100;
          
          slot.innerHTML = `
            <div class="plant-icon">${stage.icon}</div>
            <div class="plant-stage">${stage.name}</div>
            <div class="plant-health">
              <div style="font-size: 0.85em; color: #4a5568;">Sức khỏe: ${health}%</div>
              <div class="health-bar">
                <div class="health-fill" style="width: ${health}%"></div>
              </div>
            </div>
            ${plant.disease ? `<div style="margin-top:5px; font-size:0.9em; color:#e53e3e;">🦠 ${getDiseaseInfo(plant.disease).name}</div>` : ''}
            ${plant.stage === 'fruiting' ? '<div style="margin-top:5px; color:#48bb78; font-weight:bold;">✨ Sẵn sàng thu hoạch!</div>' : ''}
            <div class="plant-actions">
              <button class="action-btn" onclick="waterPlant(${i})" title="Tưới nước">💧</button>
              <button class="action-btn" onclick="fertilizePlant(${i})" title="Bón phân">🌾</button>
              <button class="action-btn" onclick="treatPlant(${i})" title="Chữa bệnh" ${plant.disease ? '' : 'disabled'}>💊</button>
              <button class="action-btn" onclick="harvestPlant(${i})" ${plant.stage === 'fruiting' ? '' : 'disabled'} title="Thu hoạch">✂️</button>
            </div>
            ${plant.stage !== 'fruiting' ? `<div class="plant-timer">⏱️ Còn ${getTimeRemaining(plant)}s</div>` : ''}
          `;
        } else {
          slot.className = 'plant-slot';
          slot.innerHTML = `
            <div style="font-size: 3em; opacity: 0.3;">➕</div>
            <div style="color: #718096; margin-top: 10px;">Trồng cây</div>
          `;
          slot.onclick = () => plantSeed(i);
        }
        
        grid.appendChild(slot);
      }
    }
    
    // Update inventory
    function updateInventory() {
      const grid = document.getElementById('inventoryGrid');
      grid.innerHTML = '';
      
      const items = [
        { key: 'water', icon: '💧', name: 'Nước' },
        { key: 'fertilizer', icon: '🌾', name: 'Phân bón' },
        { key: 'pesticide', icon: '🪲', name: 'Thuốc sâu' },
        { key: 'medicine', icon: '💊', name: 'Thuốc bệnh' }
      ];
      
      items.forEach(item => {
        const count = gameData.inventory[item.key] || 0;
        const itemEl = document.createElement('div');
        itemEl.className = 'inventory-item';
        itemEl.innerHTML = `
          <div class="item-icon">${item.icon}</div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-count">${count}</div>
          </div>
        `;
        grid.appendChild(itemEl);
      });
    }
    
    // Update shop
    function updateShop() {
      const shop = document.getElementById('shopItems');
      shop.innerHTML = '';
      
      Object.entries(SHOP_ITEMS).forEach(([key, item]) => {
        const shopItem = document.createElement('div');
        shopItem.className = 'shop-item';
        shopItem.onclick = () => buyItem(key, item);
        shopItem.innerHTML = `
          <div class="shop-item-icon">${item.icon}</div>
          <div class="shop-item-info">
            <div class="shop-item-name">${item.name}</div>
            <div class="shop-item-price">💰 ${item.price} xu</div>
          </div>
        `;
        shop.appendChild(shopItem);
      });
    }
    
    // Get time remaining
    function getTimeRemaining(plant) {
      const plantedAt = new Date(plant.planted_at);
      const now = new Date();
      const elapsed = Math.floor((now - plantedAt) / 1000);
      
      const stage = GROWTH_STAGES[plant.stage];
      const remaining = stage.duration - elapsed;
      
      return Math.max(0, remaining);
    }
    
    // Get disease info
    function getDiseaseInfo(diseaseId) {
      return DISEASES.find(d => d.id === diseaseId) || { name: 'Bệnh lạ' };
    }
    
    // Show notification
    function showNotification(message, isError = false) {
      const notif = document.getElementById('notification');
      document.getElementById('notificationText').textContent = message;
      notif.className = 'notification show' + (isError ? ' error' : '');
      
      setTimeout(() => {
        notif.className = 'notification';
      }, 3000);
    }
    
    // Show modal
    function showModal(title, text, buttons) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalText').textContent = text;
      
      const btnContainer = document.getElementById('modalButtons');
      btnContainer.innerHTML = '';
      
      buttons.forEach(btn => {
        const button = document.createElement('button');
        button.className = 'modal-btn ' + (btn.primary ? 'primary' : 'secondary');
        button.textContent = btn.text;
        button.onclick = () => {
          document.getElementById('modal').classList.remove('show');
          if (btn.action) btn.action();
        };
        btnContainer.appendChild(button);
      });
      
      document.getElementById('modal').classList.add('show');
    }
    
    // API calls
    async function apiCall(endpoint, data = {}) {
      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        const result = await res.json();
        
        if (result.ok) {
          gameData = result.progress;
          updateUI();
          return result;
        } else {
          showNotification(result.error || 'Có lỗi xảy ra', true);
          return null;
        }
      } catch (err) {
        showNotification('Lỗi kết nối: ' + err.message, true);
        return null;
      }
    }
    
    // Game actions
    async function plantSeed(index) {
      const result = await apiCall('/api/farm/plant', { slot: index });
      if (result) {
        showNotification('🌱 Đã trồng cây cà chua!');
      }
    }
    
    async function waterPlant(index) {
      const result = await apiCall('/api/farm/water', { slot: index });
      if (result) {
        showNotification('💧 Đã tưới nước!');
      }
    }
    
    async function fertilizePlant(index) {
      const result = await apiCall('/api/farm/fertilize', { slot: index });
      if (result) {
        showNotification('🌾 Đã bón phân!');
      }
    }
    
    async function treatPlant(index) {
      const plant = gameData.plants[index];
      if (!plant || !plant.disease) {
        showNotification('Cây không bị bệnh!', true);
        return;
      }
      
      const disease = getDiseaseInfo(plant.disease);
      const result = await apiCall('/api/farm/treat', { 
        slot: index, 
        medicine: disease.cure 
      });
      
      if (result) {
        showNotification('💊 Đã chữa bệnh cho cây!');
      }
    }
    
    async function harvestPlant(index) {
      const result = await apiCall('/api/farm/harvest', { slot: index });
      if (result) {
        showNotification(`🍅 Thu hoạch thành công! +${result.reward} xu`);
      }
    }
    
    async function buyItem(itemKey, item) {
      if (gameData.coins < item.price) {
        showNotification('Không đủ xu!', true);
        return;
      }
      
      showModal(
        '🏪 Mua ' + item.name,
        `Bạn muốn mua ${item.name} với giá ${item.price} xu?`,
        [
          {
            text: 'Mua',
            primary: true,
            action: async () => {
              const result = await apiCall('/api/farm/buy', { item: itemKey });
              if (result) {
                showNotification(`✅ Đã mua ${item.name}!`);
              }
            }
          },
          { text: 'Hủy', primary: false }
        ]
      );
    }
    
    // Auto update
    setInterval(async () => {
